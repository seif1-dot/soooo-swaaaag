<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEIF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
        }

        .name {
            font-size: 3rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.8),
                         0 0 100px rgba(255, 0, 0, 0.5),
                         0 0 150px rgba(255, 0, 0, 0.3);
        }

        .name:hover {
            transform: scale(1.1);
            text-shadow: 0 0 60px rgba(255, 0, 0, 1),
                         0 0 120px rgba(255, 0, 0, 0.7),
                         0 0 180px rgba(255, 0, 0, 0.5);
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.6) 0%, rgba(255, 0, 0, 0.2) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse-glow 4s ease-in-out infinite;
            z-index: 1;
        }

        .glow-effect-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(120px);
            animation: pulse-glow-2 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes pulse-glow-2 {
            0%, 100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        @media (max-width: 768px) {
            .name {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .glow-effect {
                width: 300px;
                height: 250px;
            }

            .glow-effect-2 {
                width: 450px;
                height: 350px;
            }
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .glow-effect {
                width: 200px;
                height: 200px;
                filter: blur(60px);
            }

            .glow-effect-2 {
                width: 300px;
                height: 280px;
                filter: blur(80px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow-effect"></div>
        <div class="glow-effect-2"></div>
        <h1 class="name" id="nameBtn">س ي ف</h1>
    </div>

    <script>
        const nameBtn = document.getElementById('nameBtn');
        
        nameBtn.addEventListener('click', () => {
            // Change this URL to your portfolio/photos page
            window.location.href = 'portfolio.html';
        });
    </script>
</body>
</html>
