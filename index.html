<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>س ي ف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* ===== LANDING PAGE ===== */
        .landing-page {
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .dollar-rain {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(80, 80, 80, 0.15);
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            text-align: center;
        }

        .name {
            font-size: 2rem;
            font-weight: bold;
            color: #666666;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.4),
                         0 0 60px rgba(255, 0, 0, 0.15);
        }

        .name:hover {
            transform: scale(1.15);
            color: #888888;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.6),
                         0 0 80px rgba(255, 0, 0, 0.25);
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.5) 0%, rgba(255, 0, 0, 0.15) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse-glow 2s ease-in-out infinite;
            z-index: 1;
        }

        .glow-effect-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse-glow-2 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes pulse-glow-2 {
            0%, 100% {
                opacity: 0.2;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.35;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        /* ===== PORTFOLIO PAGE ===== */
        .portfolio-container {
            width: 100%;
            background: #000000;
            display: none;
            position: relative;
        }

        .portfolio-bg-dollars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dollar-bg {
            position: absolute;
            font-size: 2rem;
            color: rgba(60, 60, 60, 0.12);
            animation: fall-slow linear infinite;
            pointer-events: none;
        }

        @keyframes fall-slow {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .photo-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .section-wrapper {
            position: relative;
            width: 72%;
            height: 80%;
            max-width: 420px;
            cursor: pointer;
        }

        .portfolio-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: filter 0.3s ease;
            filter: brightness(0.85);
            box-shadow: none;
        }

        .portfolio-img.active {
            filter: brightness(0.5);
            animation: dark-red-flash 0.4s ease;
        }

        @keyframes dark-red-flash {
            0% {
                filter: brightness(0.85);
            }
            50% {
                filter: brightness(0.4) sepia(0.4);
            }
            100% {
                filter: brightness(0.5);
            }
        }

        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        .landing-page.hidden {
            display: none;
        }

        .portfolio-container.active {
            display: block;
        }

        @media (max-width: 768px) {
            .name {
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            .glow-effect {
                width: 200px;
                height: 200px;
            }

            .glow-effect-2 {
                width: 350px;
                height: 250px;
            }

            .section-wrapper {
                width: 72%;
                height: 80%;
                max-width: 370px;
            }
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .glow-effect {
                width: 150px;
                height: 150px;
                filter: blur(50px);
            }

            .glow-effect-2 {
                width: 250px;
                height: 180px;
                filter: blur(80px);
            }

            .section-wrapper {
                width: 78%;
                height: 80%;
                max-width: 300px;
            }

            .dollar-rain {
                font-size: 1.5rem;
            }

            .dollar-bg {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- LANDING PAGE -->
    <div class="landing-page" id="landingPage">
        <div class="container">
            <div class="glow-effect"></div>
            <div class="glow-effect-2"></div>
            <h1 class="name" id="nameBtn">س ي ف</h1>
        </div>
    </div>

    <!-- PORTFOLIO PAGE -->
    <div class="portfolio-container" id="portfolioContainer">
        <div class="portfolio-bg-dollars" id="bgDollars"></div>

        <!-- Music Player - Autoplay -->
        <audio id="bgMusic" autoplay loop>
            <source src="hype.mp3" type="audio/mpeg">
        </audio>

        <!-- Photo Section 1 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG.7740.jpg" alt="Portfolio Photo 1" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 2 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG.7750.jpg" alt="Portfolio Photo 2" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 3 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG7760.jpg" alt="Portfolio Photo 3" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 4 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG7770.jpg" alt="Portfolio Photo 4" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>
    </div>

    <script>
        const landingPage = document.getElementById('landingPage');
        const portfolioContainer = document.getElementById('portfolioContainer');
        const nameBtn = document.getElementById('nameBtn');
        const bgMusic = document.getElementById('bgMusic');
        const portfolioImgs = document.querySelectorAll('.portfolio-img');
        const bgDollars = document.getElementById('bgDollars');

        // Create falling dollars background
        function createDollarRain(container, count) {
            for (let i = 0; i < count; i++) {
                const dollar = document.createElement('div');
                dollar.className = 'dollar-bg';
                dollar.textContent = '$';
                dollar.style.left = Math.random() * 100 + '%';
                dollar.style.animationDuration = (Math.random() * 5 + 8) + 's';
                dollar.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(dollar);
            }
        }

        // Create landing page dollar rain
        function createLandingDollars() {
            for (let i = 0; i < 25; i++) {
                const dollar = document.createElement('div');
                dollar.className = 'dollar-rain';
                dollar.textContent = '$';
                dollar.style.left = Math.random() * 100 + '%';
                dollar.style.animationDuration = (Math.random() * 3 + 6) + 's';
                dollar.style.animationDelay = Math.random() * 2 + 's';
                landingPage.appendChild(dollar);
            }
        }

        createLandingDollars();

        // Click name to go to portfolio
        nameBtn.addEventListener('click', () => {
            landingPage.classList.add('hidden');
            portfolioContainer.classList.add('active');
            createDollarRain(bgDollars, 35);
            bgMusic.play().catch(err => console.log('Autoplay prevented'));
        });

        // Simple dark red animation on tap
        portfolioImgs.forEach(img => {
            img.addEventListener('click', () => {
                img.classList.add('active');
                setTimeout(() => img.classList.remove('active'), 400);
            });
        });

        // Prevent image stretching on scroll
        document.addEventListener('touchmove', (e) => {
            if (portfolioContainer.classList.contains('active')) {
                // Allow normal scrolling behavior
            }
        });
    </script>
</body>
</html>
