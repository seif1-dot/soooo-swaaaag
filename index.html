<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>س ي ف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* ===== LANDING PAGE ===== */
        .landing-page {
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
        }

        .name {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.8),
                         0 0 100px rgba(255, 0, 0, 0.5),
                         0 0 150px rgba(255, 0, 0, 0.3);
        }

        .name:hover {
            transform: scale(1.15);
            text-shadow: 0 0 60px rgba(255, 0, 0, 1),
                         0 0 120px rgba(255, 0, 0, 0.7),
                         0 0 180px rgba(255, 0, 0, 0.5);
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.6) 0%, rgba(255, 0, 0, 0.2) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse-glow 4s ease-in-out infinite;
            z-index: 1;
        }

        .glow-effect-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(120px);
            animation: pulse-glow-2 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes pulse-glow-2 {
            0%, 100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        /* ===== PORTFOLIO PAGE ===== */
        .portfolio-container {
            width: 100%;
            background: #000000;
            display: none;
        }

        .photo-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            position: relative;
            overflow: hidden;
        }

        .section-wrapper {
            position: relative;
            width: 70%;
            height: 70%;
            max-width: 400px;
            cursor: pointer;
        }

        .portfolio-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transition: all 0.4s ease;
            filter: brightness(0.8);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .portfolio-img:hover,
        .portfolio-img.active {
            filter: brightness(1.2) saturate(1.5);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8), 
                        0 0 60px rgba(0, 153, 255, 0.4),
                        inset 0 0 40px rgba(255, 0, 0, 0.3);
            transform: scale(1.05);
        }

        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            border-radius: 10px;
            pointer-events: none;
        }

        .landing-page.hidden {
            display: none;
        }

        .portfolio-container.active {
            display: block;
        }

        @media (max-width: 768px) {
            .name {
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            .glow-effect {
                width: 300px;
                height: 250px;
            }

            .glow-effect-2 {
                width: 450px;
                height: 350px;
            }

            .section-wrapper {
                width: 75%;
                height: 75%;
                max-width: 350px;
            }
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .glow-effect {
                width: 200px;
                height: 200px;
                filter: blur(60px);
            }

            .glow-effect-2 {
                width: 300px;
                height: 280px;
                filter: blur(80px);
            }

            .section-wrapper {
                width: 80%;
                height: 80%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- LANDING PAGE -->
    <div class="landing-page" id="landingPage">
        <div class="container">
            <div class="glow-effect"></div>
            <div class="glow-effect-2"></div>
            <h1 class="name" id="nameBtn">س ي ف</h1>
        </div>
    </div>

    <!-- PORTFOLIO PAGE -->
    <div class="portfolio-container" id="portfolioContainer">
        <!-- Music Player - Autoplay -->
        <audio id="bgMusic" autoplay loop>
            <source src="hype.mp3" type="audio/mpeg">
        </audio>

        <!-- Photo Section 1 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="photo1.jpg" alt="Portfolio Photo 1" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 2 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="photo2.jpg" alt="Portfolio Photo 2" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 3 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="photo3.jpg" alt="Portfolio Photo 3" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 4 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="photo4.jpg" alt="Portfolio Photo 4" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>
    </div>

    <script>
        const landingPage = document.getElementById('landingPage');
        const portfolioContainer = document.getElementById('portfolioContainer');
        const nameBtn = document.getElementById('nameBtn');
        const bgMusic = document.getElementById('bgMusic');
        const portfolioImgs = document.querySelectorAll('.portfolio-img');

        // Click name to go to portfolio
        nameBtn.addEventListener('click', () => {
            landingPage.classList.add('hidden');
            portfolioContainer.classList.add('active');
            bgMusic.play().catch(err => console.log('Autoplay prevented'));
        });

        // Image glow effects on tap/click
        portfolioImgs.forEach(img => {
            img.addEventListener('click', () => {
                img.classList.add('active');
                createParticles(img);
                setTimeout(() => img.classList.remove('active'), 600);
            });

            img.addEventListener('mouseenter', () => img.classList.add('active'));
            img.addEventListener('mouseleave', () => img.classList.remove('active'));
        });

        // Particle effect function
        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    width: 8px;
                    height: 8px;
                    background: ${i % 2 === 0 ? '#ff0000' : '#0099ff'};
                    border-radius: 50%;
                    left: ${centerX}px;
                    top: ${centerY}px;
                    pointer-events: none;
                    box-shadow: 0 0 10px ${i % 2 === 0 ? '#ff0000' : '#0099ff'};
                `;
                document.body.appendChild(particle);

                const angle = (i / 8) * Math.PI * 2;
                const velocity = 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;

                let x = centerX, y = centerY, life = 1;

                const animate = () => {
                    x += vx;
                    y += vy;
                    life -= 0.02;
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.opacity = life;

                    if (life > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                animate();
            }
        }
    </script>
</body>
</html>
